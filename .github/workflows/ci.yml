name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run tests
        run: python -m pytest
      - name: Render example dossier
        run: python scripts/build_report.py examples/haiti_scotland_dossier.yaml --output /tmp/haiti_scotland_dossier.html
